<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>발표 번호 뽑기</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <h1>발표 번호 뽑기</h1>
    <p class="subtitle">구간별로 번호를 뽑고, 3초 뒤 결과를 확인하세요.</p>

    <section class="card settings">
      <label>
        반 이름
        <input type="text" id="className" placeholder="예: 1학년 3반" />
      </label>

      <label>
        학생 수
        <input type="number" id="studentCount" min="1" max="50" value="28" />
      </label>

      <button id="setBtn">설정하기</button>
    </section>

    <section class="card draw-area">
      <div id="classTitle">우리 반</div>
      <div id="resultNumber">?</div>
      <p id="statusText">뽑을 구간을 선택하세요.</p>

      <div class="range-buttons">
        <button data-start="1" data-end="10">1~10번</button>
        <button data-start="11" data-end="20">11~20번</button>
        <button data-start="21" data-end="28">21~28번</button>
      </div>

      <button id="resetBtn" class="secondary">처음부터 다시</button>
    </section>

    <section class="card">
      <h2>뽑힌 번호</h2>
      <div id="pickedList" class="picked-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
